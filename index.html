<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ads Web</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
text-align:center;
padding:20px;
background:rgba(255,255,255,0.05);
}

.container{
max-width:800px;
margin:auto;
padding:15px;
}

.card{
background:rgba(255,255,255,0.06);
padding:18px;
border-radius:16px;
margin-top:15px;
}

.btn{
width:100%;
padding:15px;
font-size:18px;
font-weight:bold;
border:none;
border-radius:14px;
cursor:pointer;
background:linear-gradient(45deg,#00ffcc,#00aaff);
color:black;
margin-top:10px;
}

.status{
margin-top:10px;
color:#facc15;
}

</style>

</head>

<body>

<header>
<h1>🌐 Ads Web</h1>
<p>Separated Ads System (Fixed)</p>
</header>

<div class="container">

<!-- MULTI TAG AD -->
<div class="card">
<h2>🎁 Multi Tag Ad</h2>
<button class="btn" onclick="multiAd()">🎬 Show Multi Ad</button>
<p id="status1" class="status"></p>
</div>

<!-- POPUNDER AD -->
<div class="card">
<h2>⚡ Popunder Ad</h2>
<button class="btn" onclick="popAd()">🚀 Show Popunder</button>
<p id="status2" class="status"></p>
</div>

</div>

<script>

function multiAd(){
document.getElementById("status1").innerText = "🎬 Loading multi-tag ad...";

setTimeout(()=>{
document.getElementById("status1").innerText = "✅ Multi-tag ad triggered!";
},2000);
}

function popAd(){

document.getElementById("status2").innerText = "⚡ Preparing popunder...";

// IMPORTANT: load popunder ONLY on click (required by most ad networks)
var script = document.createElement("script");
script.src = "//windy-imagination.com/dFmTFez.dtGlNav/ZBGVUH/ge/mA9IuLZrUjlMk/PbTtc/wCMojFgyyTMHjsECt_NmzMA/y/OpDvIpy/NfQH";
script.async = true;
document.body.appendChild(script);

setTimeout(()=>{
document.getElementById("status2").innerText = "✅ Popunder triggered!";
},2000);

}

</script>

</body>
</html>
