header{

padding:20px;
background:rgba(255,255,255,0.05);

}

header p{
color:#cbd5e1;
}

.container{
max-width:800px;
margin:auto;
padding:15px;
}

.card{
background:rgba(255,255,255,0.06);
padding:18px;
border-radius:16px;
margin-top:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h2{
color:#00d4ff;

.btn{
