<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ads Web</title>

<meta name="description" content="Simple website with HilltopAds integration.">
<meta name="referrer" content="no-referrer-when-downgrade" />

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
text-align:center;
padding:20px;
background:rgba(255,255,255,0.05);
}

header h1{
margin:0;
font-size:34px;
color:#00d4ff;
}

header p{
color:#cbd5e1;
}

.container{
max-width:800px;
margin:auto;
padding:15px;
}

.card{
background:rgba(255,255,255,0.06);
padding:18px;
border-radius:16px;
margin-top:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h2{
color:#00d4ff;
}

.btn{
width:100%;
padding:15px;
font-size:18px;
font-weight:bold;
border:none;
border-radius:14px;
cursor:pointer;
background:linear-gradient(45deg,#00ffcc,#00aaff);
color:black;
margin-top:10px;
}

#status,#status2,#status3{
margin-top:10px;
color:#facc15;
}

</style>

<!-- 🔥 MAIN HILLTOPADS ZONE -->
<script>
(function(isnr){
var d = document,
    s = d.createElement('script'),
    l = d.scripts[d.scripts.length - 1];

s.settings = isnr || {};
s.src = "//sophisticatedpin.com/b/X/VLs.dqGDl/0/YjW/cb/SeLm-9ZuJZ/UvlXkvP/TJcYw/MYjYQn5ANUjzENtsNwzoAVybNCDzkW2GNPQq";
s.async = true;
s.referrerPolicy = 'no-referrer-when-downgrade';

l.parentNode.insertBefore(s, l);
})({})
</script>

</head>

<body>

<header>
<h1>🌐 Ads Web</h1>
<p>Monetized with HilltopAds Zones</p>
</header>

<div class="container">

<!-- MAIN AD -->
<div class="card">
<h2>🎁 Main Ad</h2>
<button class="btn" onclick="watchAd()">🎬 Watch Main Ad</button>
<p id="status"></p>
</div>

<!-- EXTRA AD 1 -->
<div class="card">
<h2>🚀 Extra Ad Zone 1</h2>
<button class="btn" onclick="loadExtraAd()">🔥 Watch Extra Ad 1</button>
<p id="status2"></p>
</div>

<!-- EXTRA AD 2 -->
<div class="card">
<h2>⚡ Extra Ad Zone 2</h2>
<button class="btn" onclick="loadExtraAd2()">🚀 Watch Extra Ad 2</button>
<p id="status3"></p>
</div>

</div>

<script>

function watchAd(){
document.getElementById("status").innerText = "🎬 Loading main ad...";
setTimeout(()=>{
document.getElementById("status").innerText = "🎉 Main ad triggered!";
},2000);
}

function loadExtraAd(){
document.getElementById("status2").innerText = "🔥 Loading extra ad 1...";

var script = document.createElement("script");
script.src = "//windy-imagination.com/dFmTFez.dtGlNav/ZBGVUH/ge/mA9IuLZrUjlMk/PbTtc/wCMojFgyyTMHjsECt_NmzMA/y/OpDvIpy/NfQH";
script.async = true;
document.body.appendChild(script);

setTimeout(()=>{
document.getElementById("status2").innerText = "✅ Extra ad 1 loaded!";
},2000);
}

function loadExtraAd2(){
document.getElementById("status3").innerText = "🔥 Loading extra ad 2...";

var script = document.createElement("script");
script.src = "https://wrathful-piano.com/b.3AVk0NPp3tpxvlbHm_VNJYZPDO0Z3OMsDvIh4yMuzDIZ1bLRTzc/wEMrjCgmzAM/jZkk";
script.async = true;
document.body.appendChild(script);

setTimeout(()=>{
document.getElementById("status3").innerText = "✅ Extra ad 2 loaded!";
},2000);
}

</script>

</body>
</html>
