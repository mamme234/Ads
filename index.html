<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ads Web</title>

<meta name="description" content="Simple website with HilltopAds integration.">
<meta name="referrer" content="no-referrer-when-downgrade" />

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
text-align:center;
padding:20px;
background:rgba(255,255,255,0.05);
}

header h1{
margin:0;
font-size:34px;
color:#00d4ff;
}

header p{
color:#cbd5e1;
}

.container{
max-width:800px;
margin:auto;
padding:15px;
}

.card{
background:rgba(255,255,255,0.06);
padding:18px;
border-radius:16px;
margin-top:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h2{
color:#00d4ff;
}

.btn{
width:100%;
padding:15px;
font-size:18px;
font-weight:bold;
border:none;
border-radius:14px;
cursor:pointer;
background:linear-gradient(45deg,#00ffcc,#00aaff);
color:black;
margin-top:10px;
}

#status{
margin-top:10px;
color:#facc15;
}

</style>

<!-- MAIN HILLTOPADS -->
<script>
(function(isnr){
var d = document,
    s = d.createElement('script'),
    l = d.scripts[d.scripts.length - 1];

s.settings = isnr || {};
s.src = "//sophisticatedpin.com/b/X/VLs.dqGDl/0/YjW/cb/SeLm-9ZuJZ/UvlXkvP/TJcYw/MYjYQn5ANUjzENtsNwzoAVybNCDzkW2GNPQq";
s.async = true;
s.referrerPolicy = 'no-referrer-when-downgrade';

l.parentNode.insertBefore(s, l);
})({})
</script>

</head>

<body>

<header>
<h1>🌐 Ads Web</h1>
<p>Monetized with HilltopAds</p>
</header>

<div class="container">

<div class="card">
<h2>🎁 Main Ad</h2>
<button class="btn" onclick="watchAd()">🎬 Watch Main Ad</button>
<p id="status"></p>
</div>

<div class="card">
<h2>🔥 Extra Ad Zone</h2>
<p>Click to load second ad script</p>

<button class="btn" onclick="loadExtraAd()">🚀 Load Extra Ad</button>
<p id="status2"></p>
</div>

</div>

<script>

function watchAd(){
let status = document.getElementById("status");
status.innerText = "🎬 Loading ad...";

setTimeout(()=>{
status.innerText = "🎉 Ad triggered successfully!";
},2000);
}

function loadExtraAd(){
let status2 = document.getElementById("status2");
status2.innerText = "🔥 Loading extra ad...";

var script = document.createElement("script");
script.src = "//windy-imagination.com/dFmTFez.dtGlNav/ZBGVUH/ge/mA9IuLZrUjlMk/PbTtc/wCMojFgyyTMHjsECt_NmzMA/y/OpDvIpy/NfQH";
script.async = true;
document.body.appendChild(script);

setTimeout(()=>{
status2.innerText = "✅ Extra ad loaded!";
},2000);
}

</script>

</body>
</html>
