<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ads Web</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
text-align:center;
padding:20px;
background:rgba(255,255,255,0.05);
}

.container{
max-width:800px;
margin:auto;
padding:15px;
}

.card{
background:rgba(255,255,255,0.06);
padding:18px;
border-radius:16px;
margin-top:15px;
}

.btn{
width:100%;
padding:15px;
font-size:18px;
font-weight:bold;
border:none;
border-radius:14px;
cursor:pointer;
background:linear-gradient(45deg,#00ffcc,#00aaff);
color:black;
margin-top:10px;
}

.status{
margin-top:10px;
color:#facc15;
}
</style>

</head>

<body>

<header>
<h1>🌐 Ads Web</h1>
<p>Fixed Ads Integration</p>
</header>

<div class="container">

<!-- MULTI AD -->
<div class="card">
<h2>🎁 Multi Ad</h2>
<button class="btn" onclick="multiAd()">🎬 Show Multi Ad</button>
<p id="status1" class="status"></p>
</div>

<!-- POPUNDER AD -->
<div class="card">
<h2>⚡ Popunder Ad</h2>
<button class="btn" onclick="popAd()">🚀 Show Popunder</button>
<p id="status2" class="status"></p>
</div>

</div>

<script>

const AD_SCRIPT = "//windy-imagination.com/dFmTFez.dtGlNav/ZBGVUH/ge/mA9IuLZrUjlMk/PbTtc/wCMojFgyyTMHjsECt_NmzMA/y/OpDvIpy/NfQH";

// MULTI AD FUNCTION
function multiAd(){
document.getElementById("status1").innerText = "🎬 Loading ad...";

loadAdScript("status1");
}

// POPUNDER FUNCTION
function popAd(){
document.getElementById("status2").innerText = "⚡ Loading popunder...";

loadAdScript("status2");
}

// COMMON LOADER (FIXED)
function loadAdScript(statusId){

const script = document.createElement("script");
script.src = AD_SCRIPT;
script.async = true;

script.onload = function(){
document.getElementById(statusId).innerText = "✅ Ad script loaded (check popup/redirect)";
};

script.onerror = function(){
document.getElementById(statusId).innerText = "❌ Ad failed (blocked or invalid script)";
};

document.body.appendChild(script);

}

</script>

</body>
</html>
