<style>

body{
margin:0;
font-family:Arial;
background:radial-gradient(circle at top,#1b2a4a,#050914 70%);
color:white;
}

/* TOPBAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(10px);
}

.user{
display:flex;
gap:10px;
align-items:center;
}

.user img{
width:48px;
height:48px;
border-radius:50%;
border:2px solid #facc15;
}

/* STATS */
.stats{
display:flex;
justify-content:space-around;
margin-top:12px;
}

.box{
background:rgba(255,255,255,0.06);
padding:12px;
border-radius:14px;
width:40%;
text-align:center;
}

.box strong{
display:block;
font-size:20px;
color:#facc15;
}

/* TAP */
.tap{
display:flex;
justify-content:center;
margin-top:70px;
}

.tap button{
width:220px;
height:220px;
border-radius:50%;
border:none;
font-size:22px;
font-weight:bold;
background:radial-gradient(circle,#ffe066,#facc15);
color:#111;
box-shadow:0 0 40px rgba(250,204,21,0.6);
}

/* SCREENS */
.screen{
display:none;
padding:15px;
}

.active{
display:block;
}

/* PROFILE */
.profileCard{
background:rgba(255,255,255,0.07);
padding:15px;
border-radius:18px;
margin-top:12px;
}

.profileHeader{
display:flex;
align-items:center;
gap:10px;
}

.profileHeader img{
width:60px;
height:60px;
border-radius:50%;
border:2px solid gold;
}

.badge{
background:gold;
color:black;
padding:3px 8px;
border-radius:10px;
font-size:12px;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:8px;
background:rgba(255,255,255,0.08);
color:white;
}

button{
padding:12px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
}

.adBtn{
width:100%;
margin-top:10px;
background:linear-gradient(45deg,#00ffcc,#00aaff);
color:black;
font-size:18px;
}

/* NAV */
.nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:rgba(0,0,0,0.6);
}

.nav button{
flex:1;
background:none;
color:white;
}

#status{
margin-top:10px;
text-align:center;
color:#facc15;
}

<!-- TELEGRAM -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script>

const tg = window.Telegram?.WebApp;
const user = tg?.initDataUnsafe?.user;

if(tg) tg.expand();

let state = {
coins:0,
usdt:0
};

/* NAVIGATION */
function show(id){

document
.querySelectorAll(".screen")
.forEach(s=>s.classList.remove("active"));

document
.getElementById(id)
.classList.add("active");

}

/* RENDER */
function render(){

document.getElementById("coins").innerText =
Math.floor(state.coins);

document.getElementById("usdt").innerText =
state.usdt.toFixed(3);

}

/* TAP */
function tap(){

state.coins += 1;
state.usdt += 0.001;

render();

}

document
.getElementById("tapBtn")
.addEventListener("click", tap);

/* COPY FUNCTIONS */
function copyRef(){

navigator.clipboard.writeText(
document.getElementById("refLink").value
);

alert("Copied");

}

function copyWallet(){

navigator.clipboard.writeText(
document.getElementById("depWallet").value
);

alert("Copied");

}

/* TASK */
function task(type){

let links = {

telegram:"https://t.me/gangs234",

youtube:"https://youtube.com/@Mamme234",

tiktok:"https://tiktok.com/@mammeliyas"

};

window.open(links[type], "_blank");

alert("Task opened!");

}

/* WITHDRAW */
function withdraw(){

let wallet =
document.getElementById("wallet").value;

let amount =
parseFloat(document.getElementById("amount").value);

if(!wallet || !amount){

alert("Enter details");

return;

}

alert("Withdraw request submitted");

}

/* TELEGRAM USER */
if(user){

document.getElementById("name").innerText =
user.first_name;

document.getElementById("uname").innerText =
"@" + (user.username || "user");

document.getElementById("pName").innerText =
user.first_name;

document.getElementById("pUser").innerText =
"ID: " + user.id;

document.getElementById("refLink").value =
"https://t.me/Studybuddy_2025Bot?start=" + user.id;

if(user.photo_url){

photo.src = user.photo_url;
pPhoto.src = user.photo_url;

}

}

/* NEW DIRECT AD BUTTON */
function openDirectAd(){

const url =
"https://windy-imagination.com/dFmTFez.dtGlNav/ZBGVUH/ge/mA9IuLZrUjlMk/PbTtc/wCMojFgyyTMHjsECt_NmzMA/y/OpDvIpy/NfQH";

if(window.Telegram && Telegram.WebApp){

Telegram.WebApp.openLink(url);

}else{

window.open(url,"_blank");

}

let status =
document.getElementById("status");

status.innerText =
"🎉 Opening reward ad...";

setTimeout(()=>{

status.innerText =
"✅ Ad opened successfully!";

},2000);

}

/* START */
render();

</script>
